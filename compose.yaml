services:
  traefik:
    image: traefik:v3.6.15
    container_name: secure-zellij-traefik
    restart: unless-stopped
    network_mode: host
    entrypoint: ["/entrypoint.sh"]
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/entrypoint.sh:/entrypoint.sh:ro
      - traefik-logs:/var/log/traefik
      - letsencrypt:/letsencrypt
    environment:
      - DOMAIN=${DOMAIN}
      - EXTRA_DOMAINS=${EXTRA_DOMAINS:-}
      - ACME_EMAIL=${ACME_EMAIL:-}
      - HTTP_PORT=${HTTP_PORT:-8080}
      - HTTPS_PORT=${HTTPS_PORT:-8443}
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: secure-zellij-fail2ban
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - traefik-logs:/var/log/traefik:ro
      - ./fail2ban:/data:ro
    environment:
      - TZ=${TZ:-UTC}
      - F2B_LOG_LEVEL=${F2B_LOG_LEVEL:-INFO}
    depends_on:
      - traefik

  alerter:
    build:
      context: ./alerter
      dockerfile: Dockerfile
    container_name: secure-zellij-alerter
    restart: unless-stopped
    volumes:
      - traefik-logs:/var/log/traefik:ro
    environment:
      - ACCESS_LOG=/var/log/traefik/access.log
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - WEBHOOK_URLS=${WEBHOOK_URLS:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - ALERT_COOLDOWN_SECONDS=${ALERT_COOLDOWN_SECONDS:-60}
      - WEBHOOK_BODY_TEMPLATE=${WEBHOOK_BODY_TEMPLATE:-}
      - ALERT_ON_STATUS=${ALERT_ON_STATUS:-101}
    networks:
      - proxy
    depends_on:
      - traefik

volumes:
  traefik-logs:
  letsencrypt:

networks:
  proxy:
    driver: bridge
