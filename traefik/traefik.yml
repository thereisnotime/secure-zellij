api:
  dashboard: false
  insecure: false

ping:
  entryPoint: ping

entryPoints:
  ping:
    address: "127.0.0.1:8099"
  web:
    address: ":${HTTP_PORT}"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":${HTTPS_PORT}"
    http:
      tls: {}

providers:
  file:
    directory: /etc/traefik/dynamic-live
    watch: true

log:
  level: INFO
  format: json

accessLog:
  filePath: /var/log/traefik/access.log
  format: json
  bufferingSize: 100
  fields:
    defaultMode: keep
    headers:
      defaultMode: keep
      names:
        User-Agent: keep
        X-Real-Ip: keep
        X-Forwarded-For: keep

