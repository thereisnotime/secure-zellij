http:
  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    real-ip:
      headers:
        customRequestHeaders:
          X-Real-Ip: ""

    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"
        contentSecurityPolicy: "default-src 'self' 'unsafe-inline' 'unsafe-eval' ws: wss:; connect-src 'self' ws: wss:"

    rate-limit:
      rateLimit:
        average: 20
        burst: 50
        period: 1s
