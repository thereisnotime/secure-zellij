http:
  routers:
    zellij-http:
      rule: "ZELLIJ_RULE"
      entryPoints:
        - web
      middlewares:
        - https-redirect
      service: noop

    zellij:
      rule: "ZELLIJ_RULE"
      entryPoints:
        - websecure
      service: zellij
      middlewares:
        - security-headers
        - real-ip
        - rate-limit
      tls: {}
      # For Let's Encrypt, replace `tls: {}` with:
      # tls:
      #   certResolver: letsencrypt

  services:
    noop:
      loadBalancer:
        servers: []

    zellij:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8082"
        passHostHeader: true
