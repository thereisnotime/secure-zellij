http:
  routers:
    zellij:
      rule: "Host(`ZELLIJ_DOMAIN`)"
      entryPoints:
        - websecure
      service: zellij
      middlewares:
        - security-headers
        - real-ip
      tls: {}
      # For Let's Encrypt, replace `tls: {}` with:
      # tls:
      #   certResolver: letsencrypt

  services:
    zellij:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8082"
        passHostHeader: true
