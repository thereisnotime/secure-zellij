# Traefik access log rotation for secure-zellij
#
# Before installing, replace LOG_PATH with the actual volume mount path:
#   podman volume inspect secure-zellij_traefik-logs --format '{{.Mountpoint}}'
#
# Or just run: just logrotate-install
#
LOG_PATH/access.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    postrotate
        podman kill --signal USR1 secure-zellij-traefik 2>/dev/null || true
    endscript
}
